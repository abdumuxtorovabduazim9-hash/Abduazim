<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABDUAZIM Effects</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        
        .main-text {
            font-size: 80px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 10px;
            background: linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000);
            background-size: 400%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: rainbow 3s linear infinite, pulse 2s ease-in-out infinite;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
            padding: 20px;
            border-radius: 20px;
        }
        
        .effects-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }
        
        .glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
            filter: blur(40px);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        @media (max-width: 768px) {
            .main-text {
                font-size: 50px;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="effects-container" id="effects"></div>
    
    <div class="container">
        <h1 class="main-text" id="text">ABDUAZIM</h1>
    </div>

    <script>
        const textElement = document.getElementById('text');
        const effectsContainer = document.getElementById('effects');
        
        // Rang effektlarini o'zgartirish
        const colors = [
            'linear-gradient(90deg, #ff0000, #ffff00, #00ff00, #00ffff, #0000ff, #ff00ff, #ff0000)',
            'linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #feca57, #ff9ff3, #54a0ff)',
            'linear-gradient(90deg, #f093fb, #f5576c, #4facfe, #00f2fe, #43e97b, #38f9d7, #fa709a)',
            'linear-gradient(90deg, #a8edea, #fed6e3, #a3bded, #6991c7, #a8edea)'
        ];
        
        let colorIndex = 0;
        
        // Har 3 sekundda rangni o'zgartirish
        setInterval(() => {
            textElement.style.backgroundImage = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
        }, 3000);
        
        // Partikullar yaratish
        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            
            // Tasodifiy o'lcham va pozitsiya
            const size = Math.random() * 10 + 5;
            const posX = Math.random() * window.innerWidth;
            const posY = Math.random() * window.innerHeight;
            
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${posX}px`;
            particle.style.top = `${posY}px`;
            
            // Tasodifiy rang
            const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff', '#00ffff'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];
            
            // Animatsiya
            particle.style.animation = `float ${Math.random() * 5 + 3}s ease-in-out infinite`;
            
            effectsContainer.appendChild(particle);
            
            // Partikullarni olib tashlash
            setTimeout(() => {
                particle.remove();
            }, 5000);
        }
        
        // Glow effektlari yaratish
        function createGlow() {
            const glow = document.createElement('div');
            glow.classList.add('glow');
            
            // Tasodifiy pozitsiya
            glow.style.left = `${Math.random() * 70 + 15}%`;
            glow.style.top = `${Math.random() * 70 + 15}%`;
            
            // Tasodifiy rang
            const hue = Math.random() * 360;
            glow.style.background = `radial-gradient(circle, hsla(${hue}, 100%, 70%, 0.3) 0%, transparent 70%)`;
            
            effectsContainer.appendChild(glow);
        }
        
        // Matn effektlari
        function textEffects() {
            const text = textElement.textContent;
            const letters = text.split('');
            
            // Harflarni alohida span ga o'ralash
            textElement.innerHTML = letters.map(letter => 
                `<span style="
                    display: inline-block;
                    animation: bounce 2s ease-in-out infinite;
                    animation-delay: ${Math.random() * 2}s;
                ">${letter}</span>`
            ).join('');
            
            // Harf uchun yangi animatsiya qo'shish
            const style = document.createElement('style');
            style.textContent = `
                @keyframes bounce {
                    0%, 100% { transform: translateY(0) rotate(0deg); }
                    50% { transform: translateY(-20px) rotate(5deg); }
                }
            `;
            document.head.appendChild(style);
        }
        
        // Dastlabki partikullar va glow effektlari
        for(let i = 0; i < 30; i++) {
            createParticle();
            if(i < 4) createGlow();
        }
        
        // Yangi partikullar qo'shish
        setInterval(createParticle, 300);
        
        // Matn effektlarini ishga tushirish
        setTimeout(textEffects, 1000);
        
        // Kursor harakatida partikullar
        document.addEventListener('mousemove', (e) => {
            if(Math.random() > 0.7) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 8 + 3;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${e.clientX}px`;
                particle.style.top = `${e.clientY}px`;
                particle.style.background = `hsl(${Math.random() * 360}, 100%, 50%)`;
                particle.style.boxShadow = `0 0 10px hsl(${Math.random() * 360}, 100%, 50%)`;
                
                effectsContainer.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        });
        
        // Oynani o'lchamini o'zgartirganda
        window.addEventListener('resize', () => {
            document.querySelectorAll('.glow').forEach(glow => glow.remove());
            for(let i = 0; i < 4; i++) {
                createGlow();
            }
        });
    </script>
</body>
</html>
